<!doctype html>
<html lang="es" data-screen-label="Marketing site">
<head>
<meta charset="utf-8">
<title>DentPro Colombia · Marketing UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<style>
  /* Make sure the kit fills available space cleanly */
  body { background: #fff; }
  /* tweak: hide nav on narrow widths */
  @media (max-width: 900px) {
    .dp-nav-links { display: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../_shared/Icons.jsx"></script>
  <script type="text/babel" src="InfoBar.jsx"></script>
  <script type="text/babel" src="Navbar.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Specialists.jsx"></script>
  <script type="text/babel" src="BookingForm.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="LoginModal.jsx"></script>

  <script type="text/babel">
    function DentProSite() {
      const [login, setLogin] = React.useState(false);
      const [theme, setTheme] = React.useState("light");
      React.useEffect(() => {
        document.documentElement.classList.toggle("dark", theme === "dark");
      }, [theme]);
      return (
        <>
          <window.DPInfoBar />
          <window.DPNavbar
            theme={theme}
            onTheme={() => setTheme(theme === "light" ? "dark" : "light")}
            onLogin={() => setLogin(true)}
          />
          <window.DPHero />
          <window.DPServices />
          <window.DPSpecialists />
          <window.DPBooking />
          <window.DPContact />
          <window.DPFooter />
          <window.DPFloatingActions />
          <window.DPLoginModal open={login} onClose={() => setLogin(false)} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<DentProSite />);
  </script>
</body>
</html>
