<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .tile { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .shape {
    width: 96px; height: 70px; background: #fff;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.7);
  }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-1); font-family: var(--font-mono); }
  .desc { font-size: 10px; color: var(--fg-3); text-align: center; line-height: 1.3; }
  .s-sm { box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06); }
  .s-md { box-shadow: 0 12px 30px -12px rgba(15, 23, 42, 0.18); }
  .s-lg { box-shadow: 0 24px 50px -20px rgba(15, 23, 42, 0.22); }
  .s-glow { box-shadow: 0 28px 70px -25px rgba(10, 61, 145, 0.45); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="shape s-sm"></div><div class="name">--shadow-sm</div><div class="desc">UI chrome, info bar</div></div>
    <div class="tile"><div class="shape s-md"></div><div class="name">--shadow-md</div><div class="desc">Inputs, secondary buttons</div></div>
    <div class="tile"><div class="shape s-lg"></div><div class="name">--shadow-lg</div><div class="desc">Cards default lift</div></div>
    <div class="tile"><div class="shape s-glow"></div><div class="name">--shadow-glow</div><div class="desc">Primary CTA, hover</div></div>
  </div>
</body>
</html>
