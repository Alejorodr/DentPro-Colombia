<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 5px; }
  .chip { aspect-ratio: 1 / 1; border-radius: 12px; box-shadow: inset 0 0 0 1px rgba(15,23,42,0.08); }
  .name { font-size: 10px; font-weight: 600; color: var(--fg-1); line-height: 1.1; }
  .hex { font-size: 9px; color: var(--fg-3); font-family: var(--font-mono); }
  h4 { margin: 0 0 8px; font-size: 12px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
</style>
</head>
<body>
  <h4>Slate ramp · neutrals</h4>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#f8fafc"></div><div class="name">slate-50</div><div class="hex">#f8fafc</div></div>
    <div class="sw"><div class="chip" style="background:#f1f5f9"></div><div class="name">slate-100</div><div class="hex">#f1f5f9</div></div>
    <div class="sw"><div class="chip" style="background:#e2e8f0"></div><div class="name">slate-200</div><div class="hex">#e2e8f0</div></div>
    <div class="sw"><div class="chip" style="background:#cbd5e1"></div><div class="name">slate-300</div><div class="hex">#cbd5e1</div></div>
    <div class="sw"><div class="chip" style="background:#94a3b8"></div><div class="name">slate-400</div><div class="hex">#94a3b8</div></div>
    <div class="sw"><div class="chip" style="background:#64748b"></div><div class="name">slate-500</div><div class="hex">#64748b</div></div>
    <div class="sw"><div class="chip" style="background:#475569"></div><div class="name">slate-600</div><div class="hex">#475569</div></div>
    <div class="sw"><div class="chip" style="background:#0f172a"></div><div class="name">slate-900</div><div class="hex">#0f172a</div></div>
  </div>
</body>
</html>
