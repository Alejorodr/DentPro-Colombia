<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
  .row:last-child { border-bottom: none; }
  .label { width: 110px; flex-shrink: 0; font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .sample { color: var(--fg-1); line-height: 1.1; }
  .meta { font-size: 10px; color: var(--fg-4); margin-top: 2px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">H1 · display</div>
    <div>
      <div class="sample" style="font-size: 48px; font-weight: 700; letter-spacing: -0.01em;">Cuidamos tu sonrisa</div>
      <div class="meta">48px / 700 / -0.01em · text-5xl</div>
    </div>
  </div>
  <div class="row">
    <div class="label">H2 · section</div>
    <div>
      <div class="sample" style="font-size: 30px; font-weight: 700;">Tratamientos personalizados</div>
      <div class="meta">30px / 700 · text-3xl</div>
    </div>
  </div>
  <div class="row">
    <div class="label">H3 · card</div>
    <div>
      <div class="sample" style="font-size: 20px; font-weight: 600;">Ortodoncia digital</div>
      <div class="meta">20px / 600 · text-xl</div>
    </div>
  </div>
  <p style="font-size: 10px; color: var(--fg-4); margin: 16px 0 0; font-family: var(--font-mono);">Outfit · 100–900 · brand-owned · fonts/Outfit-*.ttf</p>
</body>
</html>
