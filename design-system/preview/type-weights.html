<!-- @dsCard group="Type" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; }
  .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px dashed #eef2f7; }
  .row:last-child { border-bottom: none; }
  .w { font-size: 11px; color: var(--fg-3); font-family: ui-monospace, Menlo, monospace; }
  .sample { font-size: 26px; color: var(--fg-1); line-height: 1.15; }
  .px { font-size: 10px; color: var(--fg-4); text-align: right; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
  <div class="row"><div class="w">100</div><div class="sample" style="font-weight: 100;">DentPro sonrisas</div><div class="px">Thin</div></div>
  <div class="row"><div class="w">200</div><div class="sample" style="font-weight: 200;">DentPro sonrisas</div><div class="px">ExtraLight</div></div>
  <div class="row"><div class="w">300</div><div class="sample" style="font-weight: 300;">DentPro sonrisas</div><div class="px">Light</div></div>
  <div class="row"><div class="w">400</div><div class="sample" style="font-weight: 400;">DentPro sonrisas</div><div class="px">Regular</div></div>
  <div class="row"><div class="w">500</div><div class="sample" style="font-weight: 500;">DentPro sonrisas</div><div class="px">Medium</div></div>
  <div class="row"><div class="w">600</div><div class="sample" style="font-weight: 600;">DentPro sonrisas</div><div class="px">SemiBold</div></div>
  <div class="row"><div class="w">700</div><div class="sample" style="font-weight: 700;">DentPro sonrisas</div><div class="px">Bold ★</div></div>
  <div class="row"><div class="w">800</div><div class="sample" style="font-weight: 800;">DentPro sonrisas</div><div class="px">ExtraBold</div></div>
  <div class="row"><div class="w">900</div><div class="sample" style="font-weight: 900;">DentPro sonrisas</div><div class="px">Black</div></div>
</body>
</html>
