<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .label { width: 86px; font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: 9999px;
    padding: 12px 24px;
    font-size: 14px; font-weight: 600;
    font-family: var(--font-sans);
    border: 1px solid transparent;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .btn-primary { background: var(--color-brand-teal); color: #fff; box-shadow: 0 12px 28px -10px rgba(10, 61, 145, 0.45); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 28px 70px -25px rgba(10, 61, 145, 0.45); }
  .btn-secondary {
    background: rgba(255, 255, 255, 0.8);
    color: var(--color-brand-teal);
    border-color: rgba(31, 108, 211, 0.35);
  }
  .btn-secondary:hover { background: rgba(230, 244, 255, 0.6); color: var(--color-brand-indigo); transform: translateY(-2px); }
  .btn-ghost { background: transparent; color: var(--fg-2); }
  .btn-ghost:hover { background: #f1f5f9; color: var(--fg-1); }
  .btn-disabled { background: var(--color-brand-teal); color: #fff; opacity: 0.6; pointer-events: none; }
  .btn-sm { padding: 8px 16px; font-size: 12px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; }
  svg { width: 16px; height: 16px; }
</style>
</head>
<body>
  <div class="row"><div class="label">primary</div>
    <button class="btn btn-primary"><svg viewBox="0 0 256 256" fill="currentColor"><path d="M208 32H184V24a8 8 0 0 0-16 0v8H88V24a8 8 0 0 0-16 0v8H48a16 16 0 0 0-16 16V208a16 16 0 0 0 16 16H208a16 16 0 0 0 16-16V48A16 16 0 0 0 208 32M72 48v8a8 8 0 0 0 16 0V48h80v8a8 8 0 0 0 16 0V48h24v32H48V48Zm136 160H48V96H208V208M173.7 117.7l-56 56a8 8 0 0 1-11.4 0l-24-24a8 8 0 0 1 11.4-11.4L112 156.7l50.3-50.4a8 8 0 0 1 11.4 11.4"/></svg> Agenda tu cita</button>
    <button class="btn btn-secondary">Te contactamos</button>
  </div>
  <div class="row"><div class="label">sizes</div>
    <button class="btn btn-primary btn-sm">Reservar</button>
    <button class="btn btn-primary">Reservar</button>
    <button class="btn btn-primary btn-lg">Reservar turno</button>
  </div>
  <div class="row"><div class="label">states</div>
    <button class="btn btn-ghost">Ver más</button>
    <button class="btn btn-disabled">Enviando…</button>
  </div>
</body>
</html>
