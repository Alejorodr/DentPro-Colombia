<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; display: grid; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: var(--fg-1); }
  .input, select, textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(226, 232, 240, 0.7);
    background: rgba(255, 255, 255, 0.8);
    padding: 12px 16px;
    font-size: 14px;
    color: var(--fg-2);
    font-family: var(--font-sans);
    box-shadow: inset 0 0 0 0 transparent, 0 1px 2px rgba(15,23,42,0.05);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input:focus { border-color: var(--color-brand-teal); box-shadow: 0 0 0 3px rgba(10,61,145,0.18); }
  .input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.18); }
  .err { font-size: 12px; color: #b91c1c; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px;
    background: rgba(230, 244, 255, 0.9); color: var(--color-brand-indigo);
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="field">
      <label for="n">Nombre completo</label>
      <input class="input" id="n" placeholder="Ej. Mariana López">
    </div>
    <div class="field">
      <label for="p">Celular</label>
      <input class="input error" id="p" value="3001234">
      <span class="err">Incluye un celular válido.</span>
    </div>
  </div>
  <div class="field">
    <label for="s">¿Qué tratamiento te interesa?</label>
    <select class="input" id="s">
      <option>Selecciona una opción</option>
      <option>Ortodoncia digital</option>
    </select>
  </div>
  <div style="display:flex; gap: 8px;">
    <span class="pill">Limpieza</span>
    <span class="pill" style="background: var(--color-brand-teal); color: #fff;">Confirmada</span>
    <span class="pill" style="background: rgba(254, 226, 226, 0.7); color: #b91c1c;">Pendiente</span>
  </div>
</body>
</html>
