<!-- @dsCard group="Brand" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: var(--gradient-hero-light); padding: 28px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; align-items: center; }
  .tile {
    border-radius: var(--radius-md);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
    box-shadow: var(--shadow-sm);
  }
  .tile img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .tile.white { background: #ffffff; }
  .tile.brand { background: var(--color-brand-teal); }
  .tile.navy  { background: var(--color-brand-midnight); }
  .tile.pale  { background: var(--color-brand-light); }
  .cap { font-size: 11px; color: var(--fg-3); margin-top: 6px; text-align: center; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="tile" style="background: transparent; padding: 0;">
        <img src="../assets/logo-canonical.png" alt="DentPro full color (canonical)" style="border-radius: 16px; width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div class="cap">Full color · canonical</div>
    </div>
    <div>
      <div class="tile pale"><img src="../assets/logo-light-blue.png" alt="white version" style="filter: brightness(0) invert(1);"></div>
      <div class="cap">White · on pale tint</div>
    </div>
    <div>
      <div class="tile navy"><img src="../assets/logo-on-navy.jpg" alt="signage treatment" style="border-radius:8px"></div>
      <div class="cap">Signage · navy + sky</div>
    </div>
    <div>
      <div class="tile white"><img src="../assets/logo-light-blue.png" alt="mono sky"></div>
      <div class="cap">Monotone sky</div>
    </div>
  </div>
</body>
</html>
