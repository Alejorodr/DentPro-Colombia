<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-sans); background: #fff; padding: 22px; }
  .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: center; gap: 14px; padding: 5px 0; }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-1); font-family: var(--font-mono); }
  .bar { height: 18px; background: var(--color-brand-light); border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(31,108,211,0.18); }
  .px { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width: 4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width: 8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width: 12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width: 16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width: 24px"></div><div class="px">24 px · card pad</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width: 32px"></div><div class="px">32 px · gap</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar" style="width: 48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="name">space-20</div><div class="bar" style="width: 80px"></div><div class="px">80 px · py-20</div></div>
</body>
</html>
