name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "24.x"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dentpro"
      NEXTAUTH_SECRET: "test-secret"
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Bootstrap pnpm via Corepack
        run: |
          corepack enable
          corepack prepare --activate "$(node -p 'require("./package.json").packageManager')"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Prisma generate
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: Build
        run: pnpm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dentpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dentpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_VERSION: "24.x"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dentpro"
      NEXTAUTH_SECRET: "test-secret"
      NEXTAUTH_URL: "http://127.0.0.1:3000"
      AUTH_TRUST_HOST: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPS_ENABLED: "1"
      OPS_KEY: "ops-test-key"
      SEED_ADMIN_EMAIL: "admin@dentpro.test"
      SEED_ADMIN_PASSWORD: "Test1234!"
      RUN_E2E: "1"
      E2E_SUITE: "smoke"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Bootstrap pnpm via Corepack
        run: |
          corepack enable
          corepack prepare --activate "$(node -p 'require("./package.json").packageManager')"
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: Prisma schema deploy
        run: |
          pnpm exec prisma migrate deploy --schema prisma/schema.prisma || pnpm exec prisma db push --schema prisma/schema.prisma

      - name: Playwright browser install
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: pnpm run e2e:smoke
