name: E2E Nightly

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dentpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dentpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_VERSION: "24.x"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dentpro"
      NEXTAUTH_SECRET: "test-secret"
      NEXTAUTH_URL: "http://127.0.0.1:3000"
      AUTH_TRUST_HOST: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPS_ENABLED: "1"
      OPS_KEY: "ops-test-key"
      SEED_ADMIN_EMAIL: "admin@dentpro.test"
      SEED_ADMIN_PASSWORD: "Test1234!"
      RUN_E2E: "1"
      E2E_SUITE: "full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: Prisma schema deploy (migrate + db push)
        run: |
          pnpm exec prisma migrate deploy --schema prisma/schema.prisma
          pnpm exec prisma db push --schema prisma/schema.prisma --skip-generate

      - name: Verify required E2E tables
        run: |
          TABLE_STATE=$(pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          SELECT
            to_regclass('"User"') AS user_table,
            to_regclass('"Specialty"') AS specialty_table;
          SQL
          )
          echo "$TABLE_STATE"
          echo "$TABLE_STATE" | grep '"User"' >/dev/null
          echo "$TABLE_STATE" | grep '"Specialty"' >/dev/null

      - name: Playwright browser install
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E full
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: pnpm run e2e:full
