name: E2E Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dentpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dentpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dentpro"
      NEXTAUTH_SECRET: "test-secret"
      NEXTAUTH_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      OPS_ENABLED: "1"
      OPS_KEY: "ops-test-key"
      SEED_ADMIN_EMAIL: "admin@dentpro.test"
      SEED_ADMIN_PASSWORD: "Test1234!"
      RUN_E2E: "1"
      E2E_SUITE: "smoke"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --schema prisma/schema.prisma

      - name: Prisma migrate deploy
        run: pnpm exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Playwright browser install
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright browser deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E smoke
        run: pnpm run e2e:smoke
